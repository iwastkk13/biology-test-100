/* ←←← ここに後で送る100問データを貼り付ける
     const mcQuestions = [ ...50問... ];
     const descQuestions = [ ...50問... ];
  */

  // DOM生成（四択）
  function renderMC() {
    const mcContainer = document.getElementById("mc-container");
    mcQuestions.forEach((q, idx) => {
      const div = document.createElement("div");
      div.className = "question";

      const title = document.createElement("div");
      title.className = "q-title";
      title.textContent = `Q${idx+1}. ${q.text}`;
      div.appendChild(title);

      const choices = document.createElement("div");
      choices.className = "choices";

      q.choices.forEach((c, cIdx) => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `mc-${idx}`;
        input.value = cIdx;
        label.appendChild(input);
        label.appendChild(document.createTextNode(" " + c));
        choices.appendChild(label);
      });

      div.appendChild(choices);
      mcContainer.appendChild(div);
    });
  }

  // DOM生成（記述）
  function renderDesc() {
    const descContainer = document.getElementById("desc-container");
    descQuestions.forEach((q, idx) => {
      const div = document.createElement("div");
      div.className = "question";

      const title = document.createElement("div");
      title.className = "q-title";
      title.textContent = `記述${idx+1}. ${q.text}`;
      div.appendChild(title);

      const textarea = document.createElement("textarea");
      textarea.id = `desc-${idx}`;
      div.appendChild(textarea);

      const score = document.createElement("div");
      score.className = "desc-score";
      score.id = `desc-score-${idx}`;
      score.textContent = `キーワード一致: 0 / ${q.keywords.length}`;
      div.appendChild(score);

      descContainer.appendChild(div);
    });
  }

  // 採点
  function grade() {
    let mcCorrect = 0;

    mcQuestions.forEach((q, idx) => {
      const selected = document.querySelector(`input[name="mc-${idx}"]:checked`);
      if (selected && Number(selected.value) === q.correctIndex) mcCorrect++;
    });

    let descScore = 0;
    let descMax = 0;

    descQuestions.forEach((q, idx) => {
      const ans = document.getElementById(`desc-${idx}`).value.replace(/\s/g, "");
      let hit = 0;
      q.keywords.forEach(k => { if (ans.includes(k)) hit++; });
      descScore += hit;
      descMax += q.keywords.length;
      document.getElementById(`desc-score-${idx}`).textContent =
        `キーワード一致: ${hit} / ${q.keywords.length}`;
    });

    const result = document.getElementById("result");
    result.textContent =
      `四択: ${mcCorrect}/50 ｜ 記述: ${descScore}/${descMax}`;
  }

  document.getElementById("grade-btn").addEventListener("click", grade);

  // 初期描画
  renderMC();
  renderDesc();

  

</script>
